<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9SLEEP5RISE - Premium Lifestyle Community</title>
    <meta name="description" content="Join 9SLEEP5RISE, a community for early birds and fasting enthusiasts. Support for multiple languages.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="lang-zh">
    <div id="bg-layer" class="app-bg morning">
        <div class="bg-overlay"></div>
    </div>

    <header style="padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 10;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="images/logo.jpg" alt="9SLEEP5RISE Logo" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--glass-border);">
            <span style="font-weight: 700; font-size: 20px; letter-spacing: 1px;">9SLEEP5RISE</span>
        </div>
        <select id="lang-switcher" class="glass" style="padding: 4px 8px; border-radius: 8px; color: white; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); font-size: 12px; cursor: pointer;">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="ar">العربية</option>
        </select>
    </header>

    <main id="app">
        <!-- View: Home -->
        <div id="view-home" class="view active">
            <!-- Ritual Hub -->
            <section id="ritual-hub" class="animate-in">
                <div class="ritual-card glass">
                    <p id="ritual-status" class="ritual-title" data-i18n="morning_ritual">晨起仪式</p>
                    <h1 id="current-time" class="ritual-time">05:00</h1>
                    <button id="checkin-btn" class="check-in-btn" data-i18n="start_day">开启新的一天</button>
                </div>
            </section>

            <!-- Stats Grid -->
            <section class="stats-container animate-in" style="animation-delay: 0.1s;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
                    <div class="glass" style="padding: 16px;">
                        <p style="font-size: 10px; color: var(--text-muted);" data-i18n="streak">坚持天数</p>
                        <p style="font-size: 24px; font-weight: 700;">12</p>
                    </div>
                    <div class="glass" style="padding: 16px;">
                        <p style="font-size: 10px; color: var(--text-muted);" data-i18n="fasting">正在断食</p>
                        <p style="font-size: 24px; font-weight: 700; color: var(--primary-fasting);">14:21:05</p>
                    </div>
                </div>
            </section>
        </div>

        <!-- View: Social (Square) -->
        <div id="view-social" class="view">
            <section id="community-feed">
                <div class="feed-header">
                    <h2 style="font-size: 18px;" data-i18n="community_feed">社群动态</h2>
                    <div id="post-type-selector" style="display: flex; gap: 12px;">
                        <span style="opacity: 0.6;">📷</span>
                        <span style="opacity: 0.6;">🎙️</span>
                        <span style="opacity: 0.6;">✍️</span>
                    </div>
                </div>

                <div id="feed-list">
                    <!-- Posts will be injected here -->
                    <div class="post glass animate-in">
                        <div class="post-header">
                            <div class="avatar" style="background: linear-gradient(45deg, #f472b6, #fb923c);"></div>
                            <div>
                                <p class="username">张小晨</p>
                                <p style="font-size: 10px; color: var(--text-muted);">10m ago · <span data-i18n="morning_checkin">晨起打卡</span></p>
                            </div>
                        </div>
                        <div class="post-content" data-i18n="post_1_content">
                            今天5点准时起来了！空气真的很好，准备去晨跑。大家一起加油！
                        </div>
                        <div class="post-actions">
                            <span>👏 128 <span data-i18n="encourage">鼓励</span></span>
                            <span>💬 12 <span data-i18n="discuss">讨论</span></span>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- View: Stats -->
        <div id="view-stats" class="view">
            <h2 style="margin-bottom: 20px;" data-i18n="stats_title">个人统计</h2>
            <div class="glass animate-in" style="padding: 24px; text-align: center; margin-bottom: 24px;">
                <p style="color: var(--text-muted); font-size: 14px;" data-i18n="total_checkins">总打卡次数</p>
                <p style="font-size: 48px; font-weight: 700; color: var(--primary-morning);">156</p>
            </div>
            <div class="glass animate-in" style="padding: 24px; animation-delay: 0.1s;">
                <p style="margin-bottom: 12px; font-weight: 600;" data-i18n="weekly_report">本周报告</p>
                <div style="height: 100px; display: flex; align-items: flex-end; gap: 8px;">
                    <div style="flex: 1; background: var(--primary-morning); height: 80%; border-radius: 4px;"></div>
                    <div style="flex: 1; background: var(--primary-morning); height: 60%; border-radius: 4px;"></div>
                    <div style="flex: 1; background: var(--primary-morning); height: 90%; border-radius: 4px;"></div>
                    <div style="flex: 1; background: var(--primary-morning); height: 100%; border-radius: 4px;"></div>
                    <div style="flex: 1; background: var(--primary-morning); height: 70%; border-radius: 4px;"></div>
                    <div style="flex: 1; background: var(--primary-morning); height: 40%; border-radius: 4px;"></div>
                    <div style="flex: 1; background: rgba(255,255,255,0.1); height: 10%; border-radius: 4px;"></div>
                </div>
            </div>
        </div>

        <!-- View: Profile -->
        <div id="view-me" class="view">
            <div style="text-align: center; margin-bottom: 32px;" class="animate-in">
                <div class="avatar" style="width: 80px; height: 80px; margin: 0 auto 16px; background: linear-gradient(135deg, #fb923c, #6366f1); border: 4px solid var(--glass-border);"></div>
                <h2 style="font-size: 24px;">CodingWizard</h2>
                <p style="color: var(--text-muted); font-size: 14px;">Level 12 • Early Bird Elite</p>
            </div>
            <div class="glass animate-in" style="padding: 12px; animation-delay: 0.1s;">
                <div style="padding: 16px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between;">
                    <span data-i18n="my_posts">我的发布</span>
                    <span>></span>
                </div>
                <div style="padding: 16px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between;">
                    <span data-i18n="settings">设置</span>
                    <span>></span>
                </div>
                <div style="padding: 16px; display: flex; justify-content: space-between;">
                    <span data-i18n="help">帮助中心</span>
                    <span>></span>
                </div>
            </div>
        </div>
    </main>

    <!-- Media Posting Modal -->
    <input type="file" id="media-upload" accept="image/*,video/*" style="display: none;">
    <div id="post-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass animate-in" style="padding: 24px;">
            <h3 style="margin-bottom: 16px; font-size: 18px;" data-i18n="create_post">创建新动态</h3>
            <div id="media-preview-container" class="media-content" style="display: none; position: relative;">
                <img id="media-preview-img" src="" style="width: 100%; border-radius: 8px; display: none;">
                <video id="media-preview-vid" src="" controls style="width: 100%; border-radius: 8px; display: none;"></video>
                <button id="remove-media-btn" style="position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;">✕</button>
            </div>
            <textarea id="post-caption" placeholder="想说点什么..." style="width: 100%; height: 80px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: white; padding: 12px; margin-bottom: 16px; font-family: inherit; resize: none;"></textarea>
            <div style="display: flex; gap: 12px;">
                <button id="cancel-post-btn" style="flex: 1; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; cursor: pointer;">取消</button>
                <button id="submit-post-btn" style="flex: 2; padding: 12px; border-radius: 8px; background: linear-gradient(135deg, var(--primary-morning), var(--primary-night)); border: none; color: white; font-weight: 600; cursor: pointer;">发布</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-glow"></div>
        <a href="#" class="nav-item active" id="nav-home">
            <span class="nav-icon">🏠</span>
            <span data-i18n="nav_home">首页</span>
        </a>
        <a href="#" class="nav-item" id="nav-social">
            <span class="nav-icon">🌍</span>
            <span data-i18n="nav_social">广场</span>
        </a>
        <a href="#" class="nav-item" id="nav-add">
            <div style="width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary-morning), var(--primary-night)); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-top: -20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <span style="font-size: 24px; color: white;">+</span>
            </div>
            <span data-i18n="nav_post">发布</span>
        </a>
        <a href="#" class="nav-item" id="nav-stats">
            <span class="nav-icon">📊</span>
            <span data-i18n="nav_stats">统计</span>
        </a>
        <a href="#" class="nav-item" id="nav-me">
            <span class="nav-icon">👤</span>
            <span data-i18n="nav_me">我的</span>
        </a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
